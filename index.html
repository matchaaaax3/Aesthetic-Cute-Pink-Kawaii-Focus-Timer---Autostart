<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stopwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #F4DFEB;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
  }

  /* ── Video background (untouched, just referenced) ── */
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── App layout ── */
  #app {
    position: relative;
    z-index: 2;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1.5rem, 4vh, 2.8rem);
    padding: 1.5rem;
  }

  /* ── Timer numbers — big, chunky, center of attention ── */
  #timer {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(5.8rem, 21vw, 11.5rem);
    color: #FFFFFF;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    user-select: none;
    font-variant-numeric: tabular-nums;
  }

  /* ── Buttons row ── */
  .controls {
    display: flex;
    gap: clamp(0.8rem, 2.5vw, 1.4rem);
    align-items: center;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: clamp(3.6rem, 8vw, 4.6rem);
    height: clamp(3.6rem, 8vw, 4.6rem);
    background: #FFFFFF;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .btn svg {
    width: 40%;
    height: 40%;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 9px 22px rgba(0, 0, 0, 0.28);
  }

  .btn:active {
    transform: translateY(0px) scale(0.96);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
  }
</style>
</head>
<body>

  <!-- Video sits in the same folder as this file, referenced only — never modified -->
  <video id="bg-video" autoplay loop muted playsinline preload="auto">
    <source src="kawaii-timer-video.mp4" type="video/mp4" />
  </video>

  <div id="app">
    <div id="timer">00:00</div>

    <div class="controls">
      <button class="btn" id="play-btn" aria-label="Play">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 4.8C7 3.6 8.3 2.9 9.3 3.5L19.5 10.7C20.4 11.3 20.4 12.7 19.5 13.3L9.3 20.5C8.3 21.1 7 20.4 7 19.2V4.8Z" fill="#2b2b2b" stroke="#2b2b2b" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="btn" id="pause-btn" aria-label="Pause">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4.5" y="4" width="6" height="16" rx="2.5" fill="#2b2b2b"/>
          <rect x="13.5" y="4" width="6" height="16" rx="2.5" fill="#2b2b2b"/>
        </svg>
      </button>

      <button class="btn" id="stop-btn" aria-label="Stop">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="16" height="16" rx="4" fill="#2b2b2b"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    let elapsed  = 0;      // seconds
    let interval = null;

    const timerEl  = document.getElementById('timer');
    const playBtn  = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const stopBtn  = document.getElementById('stop-btn');

    function pad(n) { return String(n).padStart(2, '0'); }

    function render() {
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      timerEl.textContent = `${pad(m)}:${pad(s)}`;
    }

    function start() {
      if (interval) return;
      interval = setInterval(() => {
        elapsed++;
        render();
      }, 1000);
    }

    function pause() {
      clearInterval(interval);
      interval = null;
    }

    function stop() {
      clearInterval(interval);
      interval = null;
      elapsed = 0;
      render();
    }

    playBtn.addEventListener('click', start);
    pauseBtn.addEventListener('click', pause);
    stopBtn.addEventListener('click', stop);

    // Auto-start on load
    render();
    start();
  </script>

</body>
</html>
